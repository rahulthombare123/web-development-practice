<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>live digital clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="clock-card">
    <div class="label">
      <span>UTC+2 · CET</span>   <!-- just a label, time is local but we don't enforce zone -->
    </div>

    <!-- time will be injected here by js -->
    <div class="time" id="time">--:--:--</div>

    <!-- date element -->
    <div class="date" id="date">--- --- -- ----</div>

    <div class="footer-note">Made with ❤️ by Rahul</div>
  </div>


    <script src="script.js"></script>
</body>
</html>
