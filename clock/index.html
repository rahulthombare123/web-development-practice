<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>live digital clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="mainBody">
  <div class="clock-card">
    <div class="label">
      <span>UTC+2 · CET</span>
    </div>

    <div class="time" id="time">--:--:--</div>
    <div class="date" id="date">--- --- -- ----</div>

    <!-- background switcher buttons -->
    <div class="bg-panel">
      <button class="bg-btn" data-bg="dark">🌙 dark</button>
      <button class="bg-btn" data-bg="ocean">🌊 ocean</button>
      <button class="bg-btn" data-bg="sunset">🌅 sunset</button>
      <button class="bg-btn" data-bg="forest">🌲 forest</button>
    </div>

    <div class="footer-note">⚡ live refresh · tap to change background</div>
  </div>

    <script src="script.js"></script>
</body>
</html>
