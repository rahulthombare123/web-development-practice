<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian flag (only)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ONLY THE INDIAN FLAG – absolutely no text -->
  <div class="indian-flag">
    <div class="stripe saffron"></div>
    <div class="stripe white">
      <svg class="chakra-svg" viewBox="0 0 100 100" width="80" height="80" aria-hidden="true">
        <!-- outer circle -->
        <circle cx="50" cy="50" r="38" fill="none" stroke="#000080" stroke-width="5" />
        <!-- 24 spokes -->
        <g stroke="#000080" stroke-width="3" stroke-linecap="round">
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(0 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(15 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(30 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(45 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(60 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(75 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(90 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(105 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(120 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(135 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(150 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(165 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(180 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(195 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(210 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(225 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(240 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(255 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(270 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(285 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(300 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(315 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(330 50 50)" />
          <line x1="50" y1="15" x2="50" y2="85" transform="rotate(345 50 50)" />
        </g>
        <circle cx="50" cy="50" r="6" fill="#000080" />
      </svg>
    </div>
    <div class="stripe green"></div>
  </div>
</body>
</html>
