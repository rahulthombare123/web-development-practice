<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Todo List | simple tasks</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="todo-card">
  <div class="todo-header">
    <h1>
      <i class="fas fa-list-check"></i> 
      Todo List
    </h1>
    <div class="sub">stay organized, stay focused</div>
  </div>

  <div class="input-area">
    <div class="add-task">
      <input type="text" id="todoInput" placeholder="Write a new task..." autocomplete="off">
      <button class="add-btn" id="addTodoBtn" aria-label="Add task">
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all"><i class="fas fa-list-ul"></i> All</button>
      <button class="filter-btn" data-filter="active"><i class="far fa-circle"></i> Active</button>
      <button class="filter-btn" data-filter="completed"><i class="fas fa-check-circle"></i> Done</button>
    </div>
    <button class="clear-completed" id="clearCompletedBtn"><i class="fas fa-trash-alt"></i> Clear completed</button>
  </div>

  <div class="todo-list-container">
    <div id="todoList" class="todo-list">
      <div class="empty-message">
        <i class="far fa-smile-wink"></i> All done! Add a new task.
      </div>
    </div>
  </div>

  <div class="todo-footer">
    <div class="items-left" id="itemsLeftCounter">
      <i class="fas fa-tasks"></i> <span>0</span> items left
    </div>
    <div class="info-note">
      <i class="fas fa-edit"></i> edit • <i class="fas fa-trash"></i> delete
    </div>
  </div>
</div>

<!-- Custom JavaScript -->
<script src="script.js"></script>
</body>
</html>
