<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated CSS Buttons · color & size on hover</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
<div class="container">
  <h1>✨ animated css buttons</h1>
  <div class="subhead">hover to see color & size effects • 10 playful styles</div>

  <div class="button-collection">
    <!-- button 1 - background & text color swap -->
    <button class="btn btn-color-swap">color swap</button>

    <!-- button 2 - grow -->
    <button class="btn btn-grow">grow up</button>

    <!-- button 3 - shrink -->
    <button class="btn btn-shrink">shrink</button>

    <!-- button 4 - border color & text -->
    <button class="btn btn-border-color">border pop</button>

    <!-- button 5 - glow & lift -->
    <button class="btn btn-glow">deep glow</button>

    <!-- button 6 - scale + rotate -->
    <button class="btn btn-pop">pop rotate</button>

    <!-- button 7 - invert colors -->
    <button class="btn btn-invert">invert</button>

    <!-- button 8 - stretch horizontally -->
    <button class="btn btn-stretch">stretch</button>

    <!-- button 9 - vibrant scale -->
    <button class="btn btn-vibrant">vibrant</button>

    <!-- button 10 - morph radius & color -->
    <button class="btn btn-morph">morph</button>
  </div>

  <p class="footer-note">
    ⚡ each button uses <code>transition</code> — pure CSS, no JavaScript.
  </p>
</div>

<!-- extra note: ready for github! -->
</body>
</html>
