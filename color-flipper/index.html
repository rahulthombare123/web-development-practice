<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="body">
    <div class="card">
        <h1>🎨 Color Flipper</h1>
        <div class="subtitle">click the button — get a random hex color</div>

        <!-- preview circle -->
        <div class="color-preview" id="previewCircle"></div>

        <!-- hex display -->
        <div class="color-code" id="hexDisplay">#2c3e50</div>

        <div class="btn-group">
            <button class="btn btn-primary" id="flipBtn">✨ flip color</button>
            <button class="btn btn-outline" id="copyBtn">📋 copy</button>
        </div>

        <div class="footer-note">
            ⚡ pure html / css / javascript · background changes instantly
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
